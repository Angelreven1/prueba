<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Acceso - Smart Tennis Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="flex-container">
        
        <div class="form-card">
            <h2>Iniciar Sesión</h2>
            <hr class="linea-azul">
            <form id="form-login">
                <div class="form-group">
                    <label for="input-correo">Correo Electrónico</label>
                    <input type="email" id="input-correo" placeholder="ejemplo@tenis.com" required>
                </div>

                <div class="form-group">
                    <label for="input-pass">Contraseña</label>
                    <input type="password" id="input-pass" placeholder="********" required>
                </div>

                <button type="submit" class="btn-submit">Entrar al Sistema</button>
                <div id="mensaje-error" class="error-text"></div>
            </form>
        </div>

        <div class="form-card">
            <h2>Crear Usuario</h2>
            <hr class="linea-azul">
            <form id="form-registro">
                <div class="form-group">
                    <label for="reg-nombre">Nombre Completo</label>
                    <input type="text" id="reg-nombre" placeholder="Juan Pérez" required>
                </div>

                <div class="form-group">
                    <label for="reg-correo">Correo Electrónico</label>
                    <input type="email" id="reg-correo" placeholder="operario@tenis.com" required>
                </div>

                <div class="form-group">
                    <label for="reg-pass">Contraseña</label>
                    <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" required>
                </div>

                <div class="form-group">
                    <label for="reg-rol">Rol en la Fábrica</label>
                    <select id="reg-rol">
                        <option value="User">Operario de Production (User)</option>
                        <option value="Admin">Administrador del Sistema (Admin)</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit btn-register">Registrar Personal</button>
                <div id="mensaje-error-registro" class="error-text"></div>
            </form>
        </div>

    </div>

    <script src="login.js"></script>
</body>
</html>
